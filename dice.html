<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKATOOLBOX | CHARACTER ROLLER</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:80px;%22>🦑</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Noto+Sans+JP:wght@400;500;700;900&family=Montserrat:wght@700;900&display=block" rel="stylesheet">

<style>
  :root {
    --bg-dark: #1a1a1a;
    --card-bg: #222222;
    --ui-border: #444444;
    --accent: #C5373C;
    --text-main: #dbdee1;
    --text-sub: #b5bac1;
    --stat-max: #5c7cfa;
    --stat-min: #ff6b6b;
  }

  .material-symbols-outlined {
    display: inline-block; width: 1em; height: 1em;
    overflow: hidden; white-space: nowrap; direction: ltr; vertical-align: middle;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
    margin: 0; padding: 40px 15px 60px;
    position: relative; min-height: 100vh; box-sizing: border-box;
  }

  .container { max-width: 850px; margin: 0 auto; }

  .back-link {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text-sub);
    font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.1em; transition: 0.3s; margin-bottom: 15px; width: fit-content;
  }
  .back-link:hover { color: var(--accent); transform: translateX(-5px); }

  .card {
    background: var(--card-bg); padding: 32px 36px;
    border-radius: 12px; border: 1px solid var(--ui-border);
  }

  .ui-header { margin-bottom: 22px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-end; }
  .ui-brand { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 900; color: var(--accent); letter-spacing: 0.4em; display: block; margin-bottom: 2px; }
  .ui-title { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; line-height: 1.2; }
  .header-left { display: flex; flex-direction: column; }
  .header-right { display: flex; align-items: center; gap: 8px; padding-bottom: 4px; }

  .edition-tabs { display: flex; gap: 2px; background: #111; padding: 3px; border-radius: 4px; }
  .tab-btn { background: transparent; color: var(--text-sub); border: none; padding: 4px 12px; border-radius: 3px; font-weight: 900; cursor: pointer; transition: 0.2s; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* ALLボタン */
  .btn-all {
    background: var(--accent); color: #fff; border: none; padding: 10px 24px;
    border-radius: 20px; font-weight: 900; cursor: pointer; transition: 0.2s;
    font-size: 13px; font-family: 'Montserrat', sans-serif;
    white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    letter-spacing: 0.08em;
  }
  .btn-all:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-all:active { transform: translateY(0); filter: brightness(0.95); }
  .btn-all svg { width: 14px; height: 14px; fill: currentColor; }

  /* ADJUSTボタン */
  .btn-adjust {
    background: transparent; border: 1px solid var(--ui-border); color: var(--text-sub);
    padding: 8px 14px; border-radius: 20px; font-weight: 900; cursor: pointer;
    font-size: 12px; font-family: 'Montserrat', sans-serif;
    white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    letter-spacing: 0.06em; transition: 0.2s; position: relative;
  }
  .btn-adjust:hover { border-color: var(--accent); color: var(--accent); }
  .btn-adjust .material-symbols-outlined { font-size: 0.95rem; }
  /* 変更済みインジケーター */
  .btn-adjust .adj-modified-dot {
    position: absolute; top: 4px; right: 4px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: none;
  }
  .btn-adjust.modified .adj-modified-dot { display: block; }

  /* 初期状態インジケーター */
  .idle-hint {
    text-align: center; padding: 28px 0 20px;
    font-family: 'Montserrat', sans-serif; font-size: 0.72rem;
    font-weight: 900; letter-spacing: 0.2em; color: var(--text-sub); opacity: 0.25;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .idle-arrow { font-size: 1.4rem; opacity: 0.5; animation: bounce 1.6s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* top-stats */
  .top-stats { display: flex; gap: 8px; margin-bottom: 26px; }
  .top-box {
    flex: 1; background: #181818; padding: 14px 10px; text-align: center;
    border-bottom: 2px solid #333; position: relative;
    min-height: 56px; display: flex; flex-direction: column; justify-content: center;
    transition: border-color 0.3s;
  }
  .top-box.active { border-bottom-color: var(--accent); }
  .top-label { font-size: 0.68rem; font-weight: 900; color: var(--text-sub); display: block; margin-bottom: 3px; font-family: 'Montserrat', sans-serif; }
  .top-val { font-size: 1.9rem; font-weight: 900; color: var(--text-sub); line-height: 1; transition: color 0.3s; }
  .top-val.active { color: #fff; }

  /* stat rows */
  .main-layout { display: flex; gap: 24px; align-items: stretch; }
  .stat-column { flex: 1.3; display: flex; flex-direction: column; gap: 4px; }
  .calc-column { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .stat-row {
    display: flex; align-items: center; background: rgba(255,255,255,0.03);
    padding: 0 12px; gap: 10px; border-radius: 4px; height: 46px;
    position: relative; transition: background 0.15s;
  }
  .stat-row:hover { background: rgba(255,255,255,0.05); }
  .stat-id { font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 900; color: #fff; width: 42px; }
  .stat-dice { font-size: 0.62rem; color: var(--text-sub); font-family: monospace; width: 52px; opacity: 0.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stat-num { font-size: 1.75rem; font-weight: 900; color: #fff; width: 52px; text-align: center; }
  .is-max { color: var(--stat-max) !important; }
  .is-min { color: var(--stat-min) !important; }

  .stat-jp-hint { font-size: 0.68rem; color: var(--text-sub); flex: 1; text-align: right; opacity: 0; transition: opacity 0.3s; }
  .stat-jp-hint.visible { opacity: 0.7; }
  .stat-jp-hint b { color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.82rem; }

  .dice-btn {
    background: transparent; border: 1px solid var(--ui-border); color: var(--text-sub);
    padding: 5px; border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s; width: 28px; height: 28px; flex-shrink: 0;
  }
  .dice-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(197,55,60,0.1); }
  .dice-btn svg { width: 14px; height: 14px; fill: currentColor; }

  .luk-dice-btn { position: absolute; top: 6px; right: 6px; margin: 0; }

  /* calc cards */
  .calc-card {
    background: #181818; padding: 12px 16px; border-radius: 6px;
    border-left: 3px solid var(--ui-border);
    display: flex; flex-direction: column; flex: 1; justify-content: center;
  }
  .calc-card.accent { border-left-color: var(--accent); }

  .total-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .calc-label { font-size: 0.72rem; font-weight: bold; color: var(--text-sub); display: block; font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
  .calc-val { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }

  .calc-card.total-box { flex: 1.2; padding: 14px 18px; }
  .calc-card.total-box .calc-val { font-size: 2.6rem; }

  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 2; }
  .calc-val-center { text-align: center; width: 100%; display: block; }

  .calc-card.compact-grid { flex: 1; padding: 8px 16px; min-height: 40px; }
  .calc-card.compact-grid .calc-val { font-size: 1.15rem; }

  #trait-dice-card { display: flex; flex-direction: column; justify-content: space-between; min-height: 90px; }
  .trait-main-display { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 34px; }
  .trait-dice-area { display: flex; gap: 6px; align-items: center; margin-top: 5px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); justify-content: space-between; }
  .trait-btn-sub {
    background: #2a2a2a; border: 1px solid var(--ui-border); color: #fff;
    font-size: 0.65rem; font-weight: 900; padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-family: 'Montserrat', sans-serif; transition: 0.2s;
  }
  .trait-btn-sub:hover { border-color: var(--accent); color: var(--accent); }

  .card-content-wrap { flex: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
  .card-footer { height: 26px; display: flex; align-items: center; justify-content: center; margin-top: 8px; }
  .hint-text { font-size: 0.68rem; color: var(--text-sub); opacity: 0.4; font-family: 'Montserrat', sans-serif; letter-spacing: 0.1em; }

  select {
    background: #111; color: #fff; border: 1px solid var(--ui-border);
    padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; outline: none; width: 100%; height: 26px;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* EDU上達 */
  .edu-check-card {
    cursor: pointer; transition: 0.2s; border-left-color: #555; flex: 1; position: relative; overflow: hidden;
  }
  .edu-check-card::after {
    content: 'CLICK TO ROLL';
    position: absolute; bottom: 10px; right: 14px;
    font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 900;
    letter-spacing: 0.12em; color: var(--accent); opacity: 0.5;
  }
  .edu-check-card:hover { background: #1e1e1e; border-left-color: var(--accent); }
  .edu-check-card:hover::after { opacity: 1; }

  /* フッター */
  .footer-ctrl { margin-top: 24px; border-top: 1px solid var(--ui-border); padding-top: 20px; display: flex; justify-content: flex-end; }
  .btn-iachara {
    background: transparent; border: 1px solid var(--ui-border);
    color: var(--text-sub); padding: 9px 20px;
    border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.2s;
    font-family: 'Montserrat', 'Noto Sans JP', sans-serif; letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-iachara:hover { border-color: var(--accent); color: var(--accent); }
  .btn-iachara svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.6; }

  .fixed-footer { position: fixed; bottom: 10px; right: 15px; font-family: sans-serif; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; font-weight: bold; pointer-events: none; z-index: 9999; }

  /* ===================== ADJUST MODAL ===================== */
  .adjust-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .adjust-overlay.open { opacity: 1; pointer-events: all; }

  .adjust-modal {
    background: var(--card-bg);
    border: 1px solid var(--ui-border);
    border-radius: 14px;
    padding: 24px 28px;
    width: 420px; max-width: calc(100vw - 32px);
    max-height: 88vh; overflow-y: auto;
    transform: translateY(10px); transition: transform 0.2s;
  }
  .adjust-overlay.open .adjust-modal { transform: translateY(0); }

  .adj-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .adj-modal-title {
    font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 900;
    letter-spacing: 0.3em; color: var(--accent);
  }
  .adj-close-btn {
    background: none; border: none; color: var(--text-sub); cursor: pointer;
    font-size: 1rem; padding: 4px 6px; border-radius: 4px; display: flex; align-items: center;
    transition: 0.15s; line-height: 1;
  }
  .adj-close-btn:hover { color: #fff; background: rgba(255,255,255,0.07); }

  .adj-tabs {
    display: flex; gap: 2px; background: #111; padding: 3px; border-radius: 4px;
    margin-bottom: 18px; width: fit-content;
  }

  .adj-section-label {
    font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 900;
    letter-spacing: 0.2em; color: var(--text-sub); opacity: 0.5;
    margin-bottom: 6px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .adj-body { display: flex; flex-direction: column; }

  .adj-row {
    display: flex; align-items: center; gap: 0;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .adj-row:last-child { border-bottom: none; }

  .adj-stat-id {
    font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.9rem;
    width: 46px; color: #fff; flex-shrink: 0;
  }
  .adj-stat-id.luk { color: var(--text-sub); }

  .adj-formula {
    display: flex; align-items: center; gap: 5px; flex: 1;
  }

  .adj-sep {
    color: var(--text-sub); font-family: 'Montserrat', monospace; font-size: 0.95rem;
    font-weight: 900; flex-shrink: 0; width: 10px; text-align: center;
  }

  /* number input スタイル */
  .dice-input {
    background: #141414;
    color: #fff;
    border: 1px solid var(--ui-border);
    border-radius: 5px;
    font-size: 0.95rem;
    font-weight: 900;
    text-align: center;
    outline: none;
    padding: 5px 2px;
    height: 34px;
    font-family: 'Montserrat', sans-serif;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }
  .dice-input::-webkit-outer-spin-button,
  .dice-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .dice-input:focus { border-color: var(--accent); background: #1a1a1a; }
  .dice-input.input-d { width: 44px; }
  .dice-input.input-f { width: 44px; }
  .dice-input.input-a { width: 52px; }

  /* レンジ表示 */
  .adj-range {
    font-family: 'Montserrat', monospace; font-size: 0.6rem;
    color: var(--text-sub); opacity: 0.45; margin-left: auto; padding-left: 8px;
    white-space: nowrap;
  }

  .adj-divider {
    height: 1px; background: rgba(255,255,255,0.07);
    margin: 10px 0 12px;
  }

  .adj-luk-note {
    font-size: 0.62rem; color: var(--text-sub); opacity: 0.45;
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 6px; padding: 6px 8px;
    background: rgba(255,255,255,0.03); border-radius: 4px;
    line-height: 1.6;
  }

  .adj-footer {
    margin-top: 22px; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }

  .btn-adj-reset {
    background: transparent; border: 1px solid var(--ui-border); color: var(--text-sub);
    padding: 8px 16px; border-radius: 20px; cursor: pointer;
    font-size: 0.72rem; font-weight: 900;
    font-family: 'Montserrat', sans-serif; letter-spacing: 0.06em;
    display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;
  }
  .btn-adj-reset:hover { border-color: #fff; color: #fff; }
  .btn-adj-reset .material-symbols-outlined { font-size: 0.85rem; }

  .btn-adj-apply {
    background: var(--accent); color: #fff; border: none;
    padding: 9px 22px; border-radius: 20px; cursor: pointer;
    font-size: 12px; font-weight: 900;
    font-family: 'Montserrat', sans-serif; letter-spacing: 0.08em;
    display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;
  }
  .btn-adj-apply:hover { filter: brightness(1.15); }
  .btn-adj-apply .material-symbols-outlined { font-size: 0.85rem; }
  /* ====================================================== */

  @media screen and (max-width: 750px) {
    body { padding: 20px 10px 60px; }
    .card { padding: 20px 16px; }
    .ui-header { flex-direction: column; align-items: flex-start; gap: 12px; border-bottom-width: 2px; }
    .header-left { width: 100%; }
    .header-right { width: 100%; justify-content: space-between; align-items: center; padding-bottom: 0; }
    .btn-all { padding: 8px 18px; font-size: 12px; }
    .btn-adjust { padding: 7px 12px; font-size: 11px; }
    .top-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .top-box { padding: 10px; }
    .top-val { font-size: 1.5rem; }
    .main-layout { flex-direction: column; gap: 16px; }
    .stat-row { height: auto; padding: 10px 12px; flex-wrap: wrap; }
    .stat-id { width: 40px; font-size: 0.85rem; }
    .stat-dice { width: 50px; }
    .stat-num { width: 44px; font-size: 1.5rem; text-align: left; }
    .stat-jp-hint { width: 100%; text-align: left; flex: none; order: 10; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.05); }
    .dice-btn { position: absolute; right: 10px; top: 10px; }
    .calc-grid { grid-template-columns: 1fr; }
    .calc-card { min-height: 70px; }
    .calc-card.compact-grid { min-height: 50px; }
    .calc-val { font-size: 1.8rem; }
    .calc-card.total-box .calc-val { font-size: 2rem; }
    .footer-ctrl { justify-content: stretch; }
    .btn-iachara { width: 100%; justify-content: center; }
    .adjust-modal { padding: 20px 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-link">
    <span class="material-symbols-outlined" style="font-size: 1.2rem;">arrow_back_ios</span>
    BACK TO TOOLBOX
  </a>

  <div class="card">
    <div class="ui-header">
      <div class="header-left">
        <span class="ui-brand">IKATOOLBOX</span>
        <div class="ui-title">CHARACTER ROLLER</div>
      </div>
      <div class="header-right">
        <div class="edition-tabs">
          <button id="tab-7th" class="tab-btn active" onclick="switchEdition(7)">7th</button>
          <button id="tab-6th" class="tab-btn" onclick="switchEdition(6)">6th</button>
        </div>
        <!-- ▼ 追加: ADJUSTボタン -->
        <button class="btn-adjust" id="btn-adjust" onclick="openAdjust()">
          <span class="material-symbols-outlined">tune</span>
          ADJUST
          <span class="adj-modified-dot"></span>
        </button>
        <button class="btn-all" onclick="rollAll()">
          <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M7,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,9,7,9z M7,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,19,7,19z M12,14c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,14,12,14z M17,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,9,17,9z M17,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,19,17,19z"/></svg>
          ALL ROLL
        </button>
      </div>
    </div>

    <div class="top-stats">
      <div class="top-box" id="top-hp"><span class="top-label">HP</span><span class="top-val" id="hp-val">—</span></div>
      <div class="top-box" id="top-mp"><span class="top-label">MP</span><span class="top-val" id="mp-val">—</span></div>
      <div class="top-box" id="top-san"><span class="top-label">SAN</span><span class="top-val" id="san-val">—</span></div>
      <div class="top-box" id="top-luk">
        <span class="top-label">幸運</span>
        <span class="top-val" id="luk-val">—</span>
        <button class="dice-btn luk-dice-btn" id="luk-reroll" onclick="reroll('LUK')" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M7,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,9,7,9z M7,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,19,7,19z M12,14c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,14,12,14z M17,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,9,17,9z M17,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,19,17,19z"/></svg>
        </button>
      </div>
    </div>

    <div class="idle-hint" id="idleHint">
      <span>START TO ALL ROLL</span>
      <span class="idle-arrow">↑</span>
    </div>

    <div class="main-layout" id="mainLayout" style="display:none;">
      <div class="stat-column" id="stat-list"></div>
      <div class="calc-column">
        <div class="calc-card accent total-box">
          <div class="total-row">
            <div class="total-label-group">
              <span class="calc-label">TOTAL</span>
              <span class="calc-label" id="total-sub-label" style="font-size: 0.6rem; opacity: 0.5;">能力値合計</span>
            </div>
            <span class="calc-val" id="total-val">0</span>
          </div>
        </div>
        
        <div class="calc-grid" style="flex: 2.5;">
          <div class="calc-card">
            <div class="card-content-wrap">
              <span class="calc-label">職業技能P</span>
              <span class="calc-val calc-val-center" id="job-p-main">0</span>
              <div class="card-footer">
                <select id="job-select" onchange="updateDisplay()"></select>
              </div>
            </div>
          </div>
          <div class="calc-card">
            <div class="card-content-wrap">
              <span class="calc-label">興味技能P</span>
              <span class="calc-val calc-val-center" id="int-p">0</span>
              <div class="card-footer">
                <span class="hint-text" id="int-p-hint">INT × 2</span>
              </div>
            </div>
          </div>
        </div>

        <div class="calc-grid" id="secondary-stats-grid">
          <div class="calc-card compact-grid" id="db-card">
            <div class="total-row">
              <span class="calc-label">DB</span>
              <span class="calc-val" id="db-val">0</span>
            </div>
          </div>
          <div class="calc-card compact-grid" id="build-card">
            <div class="total-row">
              <span class="calc-label">ビルド</span>
              <span class="calc-val" id="build-val">0</span>
            </div>
          </div>
          <div class="calc-card compact-grid" id="trait-dice-card" style="display: none;">
            <div class="total-row">
              <span class="calc-label">特徴表</span>
              <button class="dice-btn" onclick="rollTraitList()">
                <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M7,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,9,7,9z M7,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,19,7,19z M12,14c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,14,12,14z M17,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,9,17,9z M17,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,19,17,19z"/></svg>
              </button>
            </div>
            <div class="trait-main-display">
              <span class="calc-val calc-val-center" id="trait-val" style="font-size: 1.1rem; color: var(--accent);">--</span>
            </div>
            <div class="trait-dice-area" id="extra-trait-dice" style="display:none;">
              <span class="calc-label" style="font-size: 0.6rem;">追加P: <b id="extra-val" style="color:#fff;">--</b></span>
              <button class="trait-btn-sub" onclick="rollExtraPoint()">ROLL</button>
            </div>
          </div>
        </div>

        <div class="calc-card edu-check-card" id="edu-check-card" onclick="checkEdu()">
          <div class="total-row">
            <span class="calc-label">EDU上達</span>
            <span class="calc-val" id="edu-display-val" style="font-size:1.4rem; color:var(--text-sub);">未実施</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-ctrl">
      <button class="btn-iachara" onclick="outputToIachara()">
        <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59L7.76 14.83l1.41 1.41L19 5.41V9h2V3h-7z"/></svg>
        いあきゃらでキャラ作成
      </button>
    </div>
  </div>
</div>

<!-- ===================== ADJUST MODAL ===================== -->
<div id="adjust-overlay" class="adjust-overlay" onclick="if(event.target===this)closeAdjust()">
  <div class="adjust-modal">
    <div class="adj-modal-header">
      <span class="adj-modal-title">DICE FORMULA</span>
      <button class="adj-close-btn" onclick="closeAdjust()">
        <span class="material-symbols-outlined" style="font-size:1.1rem;">close</span>
      </button>
    </div>

    <div class="adj-tabs">
      <button id="adj-tab-7" class="tab-btn active" onclick="switchAdjTab(7)">7th</button>
      <button id="adj-tab-6" class="tab-btn" onclick="switchAdjTab(6)">6th</button>
    </div>

    <div id="adj-body-7" class="adj-body"></div>
    <div id="adj-body-6" class="adj-body" style="display:none;"></div>

    <div class="adj-footer">
      <button class="btn-adj-reset" onclick="resetAdjust()">
        <span class="material-symbols-outlined">restart_alt</span>
        RESET
      </button>
      <button class="btn-adj-apply" onclick="applyAdjust()">
        <span class="material-symbols-outlined">check</span>
        適用
      </button>
    </div>
  </div>
</div>
<!-- ====================================================== -->

<div class="fixed-footer">✦ IKATOOLBOX</div>

<script>
  let currentEdition = 7;
  let sumVals = { STR:0, CON:0, POW:0, DEX:0, APP:0, SIZ:0, INT:0, EDU:0, LUK_SUM:0 };
  let dmsg = {};

  // ── デフォルト設定（変更しない）
  const config7th = [
    { id: "STR", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "CON", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "POW", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "DEX", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "APP", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "SIZ", d: 2, f: 6, a: 6, min: 8, max: 18 },
    { id: "INT", d: 2, f: 6, a: 6, min: 8, max: 18 },
    { id: "EDU", d: 2, f: 6, a: 6, min: 8, max: 18 }
  ];
  const config6th = [
    { id: "STR", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "CON", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "POW", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "DEX", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "APP", d: 3, f: 6, a: 0, min: 3, max: 18 },
    { id: "SIZ", d: 2, f: 6, a: 6, min: 8, max: 18 },
    { id: "INT", d: 2, f: 6, a: 6, min: 8, max: 18 },
    { id: "EDU", d: 3, f: 6, a: 3, min: 6, max: 21 }
  ];
  const defaultLUK = { d: 3, f: 6, a: 0 };

  // ── ユーザーが編集できる設定（ここを使ってロール）
  let userConfig7th = config7th.map(s => ({...s}));
  let userConfig6th = config6th.map(s => ({...s}));
  let userConfigLUK = { ...defaultLUK };

  // ── モーダルの現在タブ
  let adjCurrentTab = 7;

  const traitList = [];
  for(let i=1; i<=7; i++) {
    for(let j=1; j<=10; j++) { traitList.push(`${i}-${j.toString().padStart(2, '0')}`); }
  }

  const diceIcon = `<svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M7,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,9,7,9z M7,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S8.1,19,7,19z M12,14c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,14,12,14z M17,9c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,9,17,9z M17,19c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S18.1,19,17,19z"/></svg>`;

  // ──────────────────────────────
  //  ADJUST MODAL
  // ──────────────────────────────

  /** モーダルを開く */
  function openAdjust() {
    adjCurrentTab = currentEdition; // 現在のエディションに合わせて開く
    renderAdjBody(7);
    renderAdjBody(6);
    document.getElementById('adj-tab-7').classList.toggle('active', adjCurrentTab === 7);
    document.getElementById('adj-tab-6').classList.toggle('active', adjCurrentTab === 6);
    document.getElementById('adj-body-7').style.display = (adjCurrentTab === 7) ? '' : 'none';
    document.getElementById('adj-body-6').style.display = (adjCurrentTab === 6) ? '' : 'none';
    document.getElementById('adjust-overlay').classList.add('open');
  }

  /** モーダルを閉じる */
  function closeAdjust() {
    document.getElementById('adjust-overlay').classList.remove('open');
  }

  /** モーダル内タブ切り替え */
  function switchAdjTab(ed) {
    adjCurrentTab = ed;
    document.getElementById('adj-tab-7').classList.toggle('active', ed === 7);
    document.getElementById('adj-tab-6').classList.toggle('active', ed === 6);
    document.getElementById('adj-body-7').style.display = (ed === 7) ? '' : 'none';
    document.getElementById('adj-body-6').style.display = (ed === 6) ? '' : 'none';
  }

  /** ダイス式入力UIを生成 */
  function renderAdjBody(ed) {
    const cfgs = (ed === 7) ? userConfig7th : userConfig6th;
    const bodyEl = document.getElementById(`adj-body-${ed}`);
    let html = '';

    cfgs.forEach(s => {
      const rangeMin = s.d + s.a;
      const rangeMax = s.d * s.f + s.a;
      const aDisp = s.a >= 0 ? s.a : s.a; // そのまま (負数もOK)
      html += adjRowHTML(ed, s.id, s.d, s.f, aDisp, rangeMin, rangeMax, false);
    });

    // 7th のみ LUK を追加
    if (ed === 7) {
      html += `<div class="adj-divider"></div>
      <div class="adj-luk-note">幸運は別途 3d6 でロールされます（他の能力値と独立）</div>`;
      const lMin = userConfigLUK.d + userConfigLUK.a;
      const lMax = userConfigLUK.d * userConfigLUK.f + userConfigLUK.a;
      html += adjRowHTML(7, 'LUK', userConfigLUK.d, userConfigLUK.f, userConfigLUK.a, lMin, lMax, true);
    }

    bodyEl.innerHTML = html;
  }

  /** 1行のHTMLを生成するヘルパー */
  function adjRowHTML(ed, id, d, f, a, rMin, rMax, isLuk) {
    return `
      <div class="adj-row">
        <span class="adj-stat-id${isLuk ? ' luk' : ''}">${id}</span>
        <div class="adj-formula">
          <input type="number" class="dice-input input-d" id="adj-${ed}-${id}-d"
            value="${d}" min="1" max="20"
            oninput="refreshAdjRange(${ed},'${id}')">
          <span class="adj-sep">d</span>
          <input type="number" class="dice-input input-f" id="adj-${ed}-${id}-f"
            value="${f}" min="1" max="100"
            oninput="refreshAdjRange(${ed},'${id}')">
          <span class="adj-sep">+</span>
          <input type="number" class="dice-input input-a" id="adj-${ed}-${id}-a"
            value="${a}" min="-999" max="999"
            oninput="refreshAdjRange(${ed},'${id}')">
        </div>
        <span class="adj-range" id="adj-${ed}-${id}-range">${rMin}〜${rMax}</span>
      </div>`;
  }

  /** 入力に応じてリアルタイムでレンジ表示を更新 */
  function refreshAdjRange(ed, id) {
    const d = Math.max(1, parseInt(document.getElementById(`adj-${ed}-${id}-d`).value) || 1);
    const f = Math.max(1, parseInt(document.getElementById(`adj-${ed}-${id}-f`).value) || 1);
    const a = parseInt(document.getElementById(`adj-${ed}-${id}-a`).value) || 0;
    const el = document.getElementById(`adj-${ed}-${id}-range`);
    if (el) el.innerText = `${d + a}〜${d * f + a}`;
  }

  /** 入力値読み込みヘルパー */
  function readAdj(ed, id, key, fallback) {
    const el = document.getElementById(`adj-${ed}-${id}-${key}`);
    if (!el) return fallback;
    return parseInt(el.value) || 0;
  }

  /** 適用ボタン */
  function applyAdjust() {
    // 7th 適用
    userConfig7th.forEach(s => {
      s.d = Math.max(1, readAdj(7, s.id, 'd', s.d));
      s.f = Math.max(1, readAdj(7, s.id, 'f', s.f));
      s.a = readAdj(7, s.id, 'a', s.a);
      s.min = s.d + s.a;
      s.max = s.d * s.f + s.a;
    });
    // 6th 適用
    userConfig6th.forEach(s => {
      s.d = Math.max(1, readAdj(6, s.id, 'd', s.d));
      s.f = Math.max(1, readAdj(6, s.id, 'f', s.f));
      s.a = readAdj(6, s.id, 'a', s.a);
      s.min = s.d + s.a;
      s.max = s.d * s.f + s.a;
    });
    // LUK 適用 (7th)
    userConfigLUK.d = Math.max(1, readAdj(7, 'LUK', 'd', userConfigLUK.d));
    userConfigLUK.f = Math.max(1, readAdj(7, 'LUK', 'f', userConfigLUK.f));
    userConfigLUK.a = readAdj(7, 'LUK', 'a', userConfigLUK.a);

    updateModifiedIndicator();
    closeAdjust();
  }

  /** リセットボタン */
  function resetAdjust() {
    userConfig7th = config7th.map(s => ({...s}));
    userConfig6th = config6th.map(s => ({...s}));
    userConfigLUK = { ...defaultLUK };
    // 入力欄を再描画
    renderAdjBody(7);
    renderAdjBody(6);
    updateModifiedIndicator();
  }

  /** デフォルトから変更があればADJUSTボタンに赤ドットを表示 */
  function updateModifiedIndicator() {
    const isModified7 = userConfig7th.some((s, i) => {
      const d = config7th[i];
      return s.d !== d.d || s.f !== d.f || s.a !== d.a;
    });
    const isModified6 = userConfig6th.some((s, i) => {
      const d = config6th[i];
      return s.d !== d.d || s.f !== d.f || s.a !== d.a;
    });
    const isModifiedLUK = userConfigLUK.d !== defaultLUK.d || userConfigLUK.f !== defaultLUK.f || userConfigLUK.a !== defaultLUK.a;
    document.getElementById('btn-adjust').classList.toggle('modified', isModified7 || isModified6 || isModifiedLUK);
  }

  // ──────────────────────────────
  //  版切り替え
  // ──────────────────────────────
  function switchEdition(ed) {
    currentEdition = ed;
    document.getElementById('tab-7th').classList.toggle('active', ed === 7);
    document.getElementById('tab-6th').classList.toggle('active', ed === 6);
    
    if (ed === 7) {
      document.getElementById('build-card').style.display = 'flex';
      document.getElementById('trait-dice-card').style.display = 'none';
    } else {
      document.getElementById('build-card').style.display = 'none';
      document.getElementById('trait-dice-card').style.display = 'flex';
    }

    document.getElementById('edu-check-card').style.display = (ed === 7) ? 'flex' : 'none';
    document.getElementById('int-p-hint').innerText = (ed === 7) ? 'INT × 2' : 'INT × 10';
    document.getElementById('luk-reroll').style.display = (ed === 7) ? 'block' : 'none';
    document.getElementById('total-sub-label').innerText = (ed === 7) ? '能力値合計' : '能力値合計(×5前)';

    const jobSelect = document.getElementById('job-select');
    if (ed === 7) {
      jobSelect.innerHTML = `
        <option value="EDU">EDU×4</option>
        <option value="STR">STR+EDU(×2)</option>
        <option value="CON">CON+EDU(×2)</option>
        <option value="POW">POW+EDU(×2)</option>
        <option value="DEX">DEX+EDU(×2)</option>
        <option value="APP">APP+EDU(×2)</option>
        <option value="SIZ">SIZ+EDU(×2)</option>
        <option value="INT">INT+EDU(×2)</option>`;
    } else {
      jobSelect.innerHTML = `
        <option value="EDU_20">EDU × 20</option>
        <option value="EDU_STR">EDU×10 + STR×10</option>
        <option value="EDU_CON">EDU×10 + CON×10</option>
        <option value="EDU_POW">EDU×10 + POW×10</option>
        <option value="EDU_DEX">EDU×10 + DEX×10</option>
        <option value="EDU_APP">EDU×10 + APP×10</option>
        <option value="EDU_SIZ">EDU×10 + SIZ×10</option>
        <option value="EDU_INT">EDU×10 + INT×10</option>`;
    }
    updateDisplay();
  }

  // ──────────────────────────────
  //  ロール処理（userConfig を使用）
  // ──────────────────────────────
  function rollAll() {
    const config = (currentEdition === 7) ? userConfig7th : userConfig6th;
    config.forEach(s => {
      const r = Array.from({length: s.d}, () => Math.floor(Math.random() * s.f) + 1);
      dmsg[s.id] = r.join('+') + (s.a > 0 ? `+${s.a}` : s.a < 0 ? `${s.a}` : '');
      sumVals[s.id] = r.reduce((a, b) => a + b, 0) + s.a;
    });
    // LUK (7th専用・userConfigLUK を使用)
    const lk = userConfigLUK;
    const rLuk = Array.from({length: lk.d}, () => Math.floor(Math.random() * lk.f) + 1);
    sumVals.LUK_SUM = rLuk.reduce((a, b) => a + b, 0) + (lk.a || 0);

    document.getElementById('edu-display-val').innerText = "未実施";
    document.getElementById('edu-display-val').style.color = "var(--text-sub)";
    document.getElementById('trait-val').innerText = "--";
    document.getElementById('extra-trait-dice').style.display = 'none';
    document.getElementById('idleHint').style.display = 'none';
    document.getElementById('mainLayout').style.display = 'flex';
    ['top-hp','top-mp','top-san','top-luk'].forEach(id => {
      document.getElementById(id).classList.add('active');
    });
    document.querySelectorAll('.top-val').forEach(el => el.classList.add('active'));
    updateDisplay();
  }

  function reroll(id) {
    if(sumVals.STR === 0) return;
    const config = (currentEdition === 7) ? userConfig7th : userConfig6th;
    let s;
    if (id === 'LUK') {
      s = userConfigLUK;
    } else {
      s = config.find(x => x.id === id);
    }
    const r = Array.from({length: s.d}, () => Math.floor(Math.random() * s.f) + 1);
    if (id === 'LUK') {
      sumVals.LUK_SUM = r.reduce((a, b) => a + b, 0) + (s.a || 0);
    } else {
      dmsg[id] = r.join('+') + (s.a > 0 ? `+${s.a}` : s.a < 0 ? `${s.a}` : '');
      sumVals[id] = r.reduce((a, b) => a + b, 0) + (s.a || 0);
    }
    updateDisplay();
  }

  // ──────────────────────────────
  //  特徴表 / EDU上達
  // ──────────────────────────────
  function rollTraitList() {
    const shuffled = [...traitList].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 2);
    document.getElementById('trait-val').innerText = selected.join(' / ');
    const needsExtra = selected.some(s => s.startsWith('4-'));
    document.getElementById('extra-trait-dice').style.display = needsExtra ? 'flex' : 'none';
    document.getElementById('extra-val').innerText = "--";
  }

  function rollExtraPoint() {
    const res = (Math.floor(Math.random() * 6) + 1) * 10;
    document.getElementById('extra-val').innerText = res;
  }

  function checkEdu() {
    if(sumVals.EDU === 0 || currentEdition === 6) return;
    const currentEDUValue = Math.floor(sumVals.EDU * 5);
    const r = Math.floor(Math.random() * 100) + 1;
    const display = document.getElementById('edu-display-val');
    if (r > currentEDUValue || r >= 96) {
      const g = Math.floor(Math.random() * 10) + 1;
      sumVals.EDU += (g / 5);
      display.innerText = `成功 (+${g})`;
      display.style.color = "var(--stat-max)";
    } else {
      display.innerText = `失敗 (${r})`;
      display.style.color = "var(--stat-min)";
    }
    updateDisplay();
  }

  // ──────────────────────────────
  //  いあきゃら連携
  // ──────────────────────────────
  function outputToIachara() {
    if(sumVals.STR === 0) { alert("まずはロールしてください。"); return; }
    const luk = (currentEdition === 7) ? sumVals.LUK_SUM * 5 : sumVals.POW * 5;
    const params = new URLSearchParams({
      var: currentEdition.toString(),
      STR: (currentEdition === 7) ? Math.floor(sumVals.STR * 5) : sumVals.STR,
      CON: (currentEdition === 7) ? Math.floor(sumVals.CON * 5) : sumVals.CON,
      POW: (currentEdition === 7) ? Math.floor(sumVals.POW * 5) : sumVals.POW,
      DEX: (currentEdition === 7) ? Math.floor(sumVals.DEX * 5) : sumVals.DEX,
      APP: (currentEdition === 7) ? Math.floor(sumVals.APP * 5) : sumVals.APP,
      SIZ: (currentEdition === 7) ? Math.floor(sumVals.SIZ * 5) : sumVals.SIZ,
      INT: (currentEdition === 7) ? Math.floor(sumVals.INT * 5) : sumVals.INT,
      EDU: (currentEdition === 7) ? Math.floor(sumVals.EDU * 5) : sumVals.EDU,
      LUK: luk
    });
    window.open(`https://iachara.com/new/costom/webdice?${params.toString()}`, '_blank');
  }

  // ──────────────────────────────
  //  表示更新（userConfig の min/max を参照）
  // ──────────────────────────────
  function updateDisplay() {
    const config = (currentEdition === 7) ? userConfig7th : userConfig6th;
    let html = "";
    let total = 0;
    const hasRolled = sumVals.STR !== 0;
    config.forEach(s => {
      const val = (currentEdition === 7) ? Math.floor(sumVals[s.id] * 5) : sumVals[s.id];
      total += val;
      let colorClass = (val !== 0 && Math.round(sumVals[s.id]) === s.max) ? "is-max"
                     : (val !== 0 && Math.round(sumVals[s.id]) === s.min) ? "is-min" : "";
      let hintHtml = "";
      if (currentEdition === 7) {
        let eduVal = Math.floor(sumVals.EDU * 5);
        let hintVal = (s.id === "EDU") ? (val * 4) : (eduVal * 2 + val * 2);
        hintHtml = `${(s.id === "EDU") ? '基本' : '職業P'}: <b>${hintVal}</b>`;
      } else {
        let eduVal = sumVals.EDU;
        let statVal = sumVals[s.id];
        let hintVal = (s.id === "EDU") ? (statVal * 20) : (eduVal * 10 + statVal * 10);
        hintHtml = `${(s.id === "EDU") ? '基本' : '職業P'}: <b>${hintVal}</b>`;
      }
      html += `
        <div class="stat-row">
          <span class="stat-id">${s.id}</span>
          <span class="stat-dice">${dmsg[s.id] || ""}</span>
          <span class="stat-num ${colorClass}">${val}</span>
          <span class="stat-jp-hint${hasRolled ? ' visible' : ''}">${hintHtml}</span>
          <button class="dice-btn" onclick="reroll('${s.id}')">${diceIcon}</button>
        </div>`;
    });
    document.getElementById('stat-list').innerHTML = html;
    document.getElementById('total-val').innerText = total;
    const curSTR = (currentEdition === 7 ? Math.floor(sumVals.STR * 5) : sumVals.STR);
    const curCON = (currentEdition === 7 ? Math.floor(sumVals.CON * 5) : sumVals.CON);
    const curPOW = (currentEdition === 7 ? Math.floor(sumVals.POW * 5) : sumVals.POW);
    const curSIZ = (currentEdition === 7 ? Math.floor(sumVals.SIZ * 5) : sumVals.SIZ);
    const curINT = (currentEdition === 7 ? Math.floor(sumVals.INT * 5) : sumVals.INT);
    const curEDU = (currentEdition === 7 ? Math.floor(sumVals.EDU * 5) : sumVals.EDU);
    if (currentEdition === 7) {
      document.getElementById('hp-val').innerText = Math.floor((curCON + curSIZ) / 10);
      document.getElementById('mp-val').innerText = Math.floor(curPOW / 5);
      document.getElementById('san-val').innerText = curPOW;
      document.getElementById('luk-val').innerText = sumVals.LUK_SUM * 5;
    } else {
      document.getElementById('hp-val').innerText = Math.ceil((curCON + curSIZ) / 2);
      document.getElementById('mp-val').innerText = curPOW;
      document.getElementById('san-val').innerText = curPOW * 5;
      document.getElementById('luk-val').innerText = curPOW * 5;
    }
    const sel = document.getElementById('job-select').value;
    if (currentEdition === 7) {
      const curDEX = Math.floor(sumVals.DEX * 5);
      const curAPP = Math.floor(sumVals.APP * 5);
      let targetStat = (sel === 'STR') ? curSTR : (sel === 'CON') ? curCON : (sel === 'POW') ? curPOW : (sel === 'DEX') ? curDEX : (sel === 'APP') ? curAPP : (sel === 'SIZ') ? curSIZ : (sel === 'INT') ? curINT : 0;
      let jobVal = (sel === 'EDU') ? (curEDU * 4) : (curEDU * 2 + targetStat * 2);
      document.getElementById('job-p-main').innerText = (sumVals.STR === 0) ? 0 : jobVal;
      document.getElementById('int-p').innerText = curINT * 2;
    } else {
      let jobVal = 0;
      if (sel === 'EDU_20') { jobVal = curEDU * 20; }
      else {
        const statKey = sel.split('_')[1];
        const secondStat = sumVals[statKey];
        jobVal = (sumVals.EDU * 10) + (secondStat * 10);
      }
      document.getElementById('job-p-main').innerText = (sumVals.STR === 0) ? 0 : jobVal;
      document.getElementById('int-p').innerText = curINT * 10;
    }
    let db = "0", bld = 0;
    if (currentEdition === 7) {
      const ds7 = curSTR + curSIZ;
      if (ds7 <= 64) { db = "-2"; bld = "-2"; }
      else if (ds7 <= 84) { db = "-1"; bld = "-1"; }
      else if (ds7 <= 124) { db = "0"; bld = "0"; }
      else if (ds7 <= 164) { db = "+1D4"; bld = "1"; }
      else { db = "+1D6"; bld = "2"; }
      document.getElementById('build-val').innerText = bld;
    } else {
      const ds6 = sumVals.STR + sumVals.SIZ;
      if (ds6 <= 12) { db = "-1D6"; }
      else if (ds6 <= 16) { db = "-1D4"; }
      else if (ds6 <= 24) { db = "0"; }
      else if (ds6 <= 32) { db = "+1D4"; }
      else if (ds6 <= 40) { db = "+1D6"; }
      else { db = "+2D6"; }
    }
    document.getElementById('db-val').innerText = db;
  }

  window.addEventListener('DOMContentLoaded', () => { switchEdition(7); });
</script>
</body>
</html>
