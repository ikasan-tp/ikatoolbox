<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKATOOLBOX | Scenario List Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦑</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --canvas-bg: #050505;
            --canvas-text: #ffffff;
            --accent-color: #C5373C;
            --sys-text-color: #000000;
            --ui-bg: #222222;
            --ui-input: #111111;
            --ui-border: #444444;
            --ui-accent: #C5373C;
        }

        body { background: #1a1a1a; color: #eee; margin: 0; display: flex; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }

        /* ---- サイドバー（display.html準拠） ---- */
        .sidebar {
            width: 400px;
            background: var(--ui-bg);
            border-right: 1px solid var(--ui-border);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.3s ease-out;
        }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px 18px 80px; scrollbar-width: thin; scrollbar-color: #444 transparent; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .back-link { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #666; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; transition: 0.2s; margin-bottom: 16px; }
        .back-link:hover { color: var(--ui-accent); transform: translateX(-3px); }

        .ui-header { margin-bottom: 20px; border-bottom: 3px solid var(--ui-accent); padding-bottom: 12px; }
        .ui-brand { font-size: 0.68rem; font-weight: 900; color: var(--ui-accent); letter-spacing: 0.4em; display: block; margin-bottom: 2px; }
        .ui-title { font-size: 1.3rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; }

        /* セクション（display.html準拠） */
        .control-group { margin-bottom: 0; padding: 14px 0; border-bottom: 1px solid #2a2a2a; }
        .control-group:last-child { border-bottom: none; }

        h2 {
            font-size: 0.62rem; color: var(--ui-accent); margin: 0 0 12px;
            letter-spacing: 0.2em; font-weight: 900; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
        }
        h2::after { content: ""; flex: 1; height: 1px; background: var(--ui-accent); opacity: 0.2; }

        label { display: block; font-size: 0.62rem; margin-bottom: 3px; color: #666; font-weight: 700; letter-spacing: 0.04em; }

        textarea, input[type="text"], input[type="number"] {
            width: 100%; background: var(--ui-input); border: 1px solid var(--ui-border);
            color: #fff; padding: 6px 8px; border-radius: 4px; font-size: 0.78rem;
            box-sizing: border-box; font-family: inherit; margin-bottom: 6px; outline: none;
            transition: border-color 0.15s;
        }
        textarea:focus, input[type="text"]:focus, input[type="number"]:focus { border-color: var(--ui-accent); }
        select {
            width: 100%; background: var(--ui-input); border: 1px solid var(--ui-border);
            color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 0.78rem;
            box-sizing: border-box; font-family: inherit; margin-bottom: 6px; outline: none; cursor: pointer;
        }
        textarea { resize: vertical; min-height: 60px; }

        /* グリッド */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-date-sys { display: grid; grid-template-columns: 0.6fr 1.4fr; gap: 8px; }

        /* 動的入力行 */
        .dynamic-input-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .dynamic-input-row input { margin-bottom: 0; }
        .btn-mini {
            background: #2a2a2a; color: #888; border: 1px solid var(--ui-border);
            width: 28px; height: 30px; flex-shrink: 0;
            cursor: pointer; border-radius: 4px; font-size: 0.75rem;
            transition: 0.15s; display: flex; align-items: center; justify-content: center;
        }
        .btn-mini:hover { border-color: #C5373C; color: #C5373C; }

        /* ＋追加ボタン */
        .btn-add-field {
            background: transparent; color: #555; border: 1px dashed #3a3a3a;
            width: 100%; padding: 5px; font-size: 0.68rem; cursor: pointer;
            border-radius: 4px; font-weight: 700; margin-bottom: 10px;
            font-family: 'Montserrat', sans-serif; letter-spacing: 0.04em; transition: 0.15s;
        }
        .btn-add-field:hover { border-color: var(--ui-accent); color: var(--ui-accent); }

        /* トグルボタン群（display.html準拠） */
        .toggle-group { display: flex; gap: 2px; background: #111; padding: 3px; border-radius: 4px; margin-bottom: 6px; }
        .toggle-btn {
            flex: 1; padding: 6px 4px; cursor: pointer;
            border: none; background: transparent; color: #666;
            font-size: 0.68rem; font-weight: 900; border-radius: 3px;
            font-family: 'Montserrat', sans-serif; letter-spacing: 0.04em;
            transition: 0.15s;
        }
        .toggle-btn:hover { color: #aaa; }
        .toggle-btn.active { background: var(--ui-accent); color: #fff; }

        /* カラーピッカー（display.html準拠） */
        .color-picker-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .color-picker-wrap input[type="color"] { width: 36px; height: 30px; padding: 2px; border: 1px solid var(--ui-border); border-radius: 4px; background: var(--ui-input); cursor: pointer; flex-shrink: 0; }
        .color-picker-wrap .color-hex { flex: 1; background: var(--ui-input); border: 1px solid var(--ui-border); color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 0.78rem; font-family: monospace; margin-bottom: 0; }

        /* LISTに追加ボタン（このツール主アクション） */
        .add-btn {
            width: 100%; padding: 11px; background: transparent;
            color: var(--ui-accent); border: 1px solid var(--ui-accent);
            border-radius: 4px; font-weight: 900; font-size: 0.78rem;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
            font-family: 'Montserrat', sans-serif; letter-spacing: 0.08em;
        }
        .add-btn:hover { background: var(--ui-accent); color: #fff; }

        /* 保存ボタン（display.html準拠） */
        .save-btn {
            width: 100%; padding: 13px; background: var(--ui-accent); color: white;
            border: none; border-radius: 4px; font-weight: 900; font-size: 0.9rem;
            cursor: pointer; margin-top: 8px; transition: 0.2s;
            letter-spacing: 0.12em; font-family: 'Montserrat', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .save-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
        .save-btn:active { transform: translateY(0); filter: brightness(0.95); }
        .save-btn .material-symbols-outlined { font-size: 1.1rem; }

        /* クリアボタン（display.html準拠） */
        .clear-btn {
            width: 100%; background: none; border: 1px solid #333; color: #555;
            font-size: 0.68rem; font-weight: 700; cursor: pointer; margin-top: 8px;
            padding: 7px; border-radius: 4px; font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.06em; transition: 0.2s;
        }
        .clear-btn:hover { border-color: #555; color: #888; }

        /* ---- プレビューエリア ---- */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: flex-start; background: #151515; padding: 40px; overflow-y: auto; }

        #capture-canvas {
            width: 600px;
            min-height: 200px;
            background: var(--canvas-bg);
            color: var(--canvas-text);
            padding: 60px 50px 30px;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .canvas-header-tag { position: absolute; top: 30px; right: 40px; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 0.4em; font-weight: 900; color: var(--accent-color); }
        #list-container { flex: 1; }

        .list-item { margin-bottom: 35px; padding-bottom: 25px; border-bottom: 1px dashed rgba(128,128,128,0.2); }
        .list-item:last-child { border-bottom: none; }

        .item-top {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 0 8px 0; margin-bottom: 12px; border-bottom: 1px solid var(--accent-color);
        }
        .item-title-wrap { display: flex; align-items: baseline; gap: 15px; flex: 1; }
        .item-system { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; background: var(--accent-color); color: var(--sys-text-color); border-radius: 2px; text-transform: uppercase; margin-right: 5px; }
        .item-title { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 1.4rem; line-height: 1.2; word-break: break-all; }
        .item-scenario-author { font-size: 0.85rem; opacity: 0.5; font-weight: 700; white-space: nowrap; }
        .item-date { font-family: 'Montserrat'; font-size: 0.8rem; opacity: 0.4; font-weight: 700; white-space: nowrap; margin-left: 10px; }
        .pc-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px 0; }
        .pc-tag { font-size: 0.65rem; padding: 3px 12px; border-radius: 2px; border: 1px solid var(--accent-color); font-weight: bold; background: color-mix(in srgb, var(--accent-color), transparent 85%); color: var(--accent-color); }
        .item-members { font-size: 0.7rem; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 0.05em; color: var(--accent-color); opacity: 0.8; word-break: break-all; }
        .item-memo { font-size: 0.85rem; opacity: 0.8; line-height: 1.7; white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word; }
        .canvas-footer { margin-top: 15px; font-size: 0.55rem; opacity: 0.2; text-align: center; font-family: 'Montserrat'; letter-spacing: 0.3em; font-weight: 700; border-top: 1px solid rgba(128,128,128,0.1); padding-top: 20px; flex-shrink: 0; }

        /* モバイルメニューボタン（display.html準拠） */
        .mobile-menu-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 52px; height: 52px; border-radius: 50%;
            background: var(--ui-accent); color: white; border: none;
            z-index: 10001; cursor: pointer; display: none;
            align-items: center; justify-content: center;
        }
        .mobile-menu-btn span { transition: transform 0.3s ease; display: inline-block; }

        @media screen and (max-width: 1024px) {
            body { overflow: hidden; }
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); height: 100%; width: 85%; max-width: 380px; }
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .preview-area { padding: 20px; width: 100vw; box-sizing: border-box; }
            #capture-canvas { width: 100%; min-width: auto; padding: 40px 25px 25px; }
            .item-title { font-size: 1.1rem; }
            .mobile-menu-btn { display: flex; }
            input, textarea, select { font-size: 16px !important; }
        }
    </style>
</head>
<body>

<button id="menu-toggle" class="mobile-menu-btn">
    <span class="material-symbols-outlined">settings</span>
</button>

<div class="sidebar">
    <div class="sidebar-scroll">
        <a href="index.html" class="back-link">
            <span class="material-symbols-outlined" style="font-size: 0.9rem;">arrow_back_ios</span>
            BACK TO TOOLBOX
        </a>
        <div class="ui-header">
            <span class="ui-brand">IKATOOLBOX</span>
            <div class="ui-title">SCENARIO LIST</div>
        </div>
        <div class="control-group">
            <h2>1. キャンバス設定</h2>
            <label>テーマ</label>
            <div class="toggle-group" style="margin-bottom:12px;">
                <button id="btn-dark" class="toggle-btn active" onclick="setCanvasTheme('dark')">DARK</button>
                <button id="btn-light" class="toggle-btn" onclick="setCanvasTheme('light')">LIGHT</button>
            </div>
            <label>アクセントカラー</label>
            <div class="color-picker-wrap">
                <input type="color" id="color-picker" value="#C5373C" oninput="syncColor(this.value)">
                <input type="text" id="color-hex" class="color-hex" value="#C5373C" maxlength="7" oninput="syncColorFromHex(this.value)">
            </div>
            <label>フッターテキスト</label>
            <input type="text" id="ui-footer-text" oninput="updateFooter(this.value)" placeholder="CALL OF CTHULHU SESSION RECORD">
        </div>
        <div class="control-group">
            <h2>2. シナリオ情報</h2>
            <div class="grid-date-sys">
                <div><label>日付</label><input type="text" id="in-date" placeholder="12/01"></div>
                <div><label>システム名</label><input type="text" id="in-system" placeholder="CoC, エモクロア等"></div>
            </div>
            
            <div style="margin-top:10px;">
                <div class="grid-2">
                    <div><label>タイトル</label><input type="text" id="in-title" placeholder="シナリオ名"></div>
                    <div><label>作者名</label><input type="text" id="in-author" placeholder="作者"></div>
                </div>
            </div>

            <label style="margin-top:10px;">PC情報</label>
            <div id="pc-fields">
                <div class="dynamic-input-row">
                    <input type="text" class="in-pc-label" placeholder="PC">
                    <input type="text" class="in-pc-name" placeholder="PC名">
                    <button class="btn-mini" onclick="this.parentElement.remove()">×</button>
                </div>
            </div>
            <button class="btn-add-field" onclick="addPcField()">＋ PCを追加</button>

            <label>KP / PL</label>
            <input type="text" id="in-kp" placeholder="KP名">
            <div id="pl-fields" style="margin-top:5px;"><div class="dynamic-input-row"><input type="text" class="in-pl" placeholder="PL名"><button class="btn-mini" onclick="this.parentElement.remove()">×</button></div></div>
            <button class="btn-add-field" onclick="addPlField()">＋ PLを追加</button>
            
            <label>メモ</label>
            <textarea id="in-memo" rows="3" placeholder="感想やメモなど"></textarea>

            <button class="add-btn" onclick="addItem()">LISTに追加</button>
        </div>
        <div class="control-group">
            <h2>3. 出力</h2>
            <button class="save-btn" onclick="saveImage()">
                <span class="material-symbols-outlined">download</span>
                画像を保存する
            </button>
            <button class="clear-btn" onclick="location.reload()">リストをすべてクリア</button>
        </div>
    </div>
</div>

<div class="preview-area">
    <div id="capture-canvas">
        <div class="canvas-header-tag" id="dynamic-header-tag">SCENARIO LOGS</div>
        <div id="list-container">
            <div style="color:#444; text-align:center; margin-top:40px; font-weight:900; letter-spacing:0.2em;" id="placeholder-msg">NO RECORDS</div>
        </div>
        <div class="canvas-footer" id="dynamic-footer">✦ CALL OF CTHULHU SESSION RECORD</div>
    </div>
</div>

<div id="fixed-logo" style="position: fixed; bottom: 10px; right: 15px; font-family: sans-serif; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; font-weight: bold; pointer-events: none; z-index: 9999;">✦ IKATOOLBOX</div>

<script>
    const root = document.documentElement;
    const canvasEl = document.getElementById('capture-canvas');
    const defaultFooter = "CALL OF CTHULHU SESSION RECORD";
    const menuBtn = document.getElementById('menu-toggle');
    const sidebar = document.querySelector('.sidebar');

    function toggleMenu() {
        sidebar.classList.toggle('active');
        menuBtn.classList.toggle('is-active');
        const icon = menuBtn.querySelector('.material-symbols-outlined');
        icon.textContent = sidebar.classList.contains('active') ? 'close' : 'settings';
    }

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMenu();
    });

    function setCanvasTheme(theme) {
        const isDark = theme === 'dark';
        root.style.setProperty('--canvas-bg', isDark ? '#050505' : '#ffffff');
        root.style.setProperty('--canvas-text', isDark ? '#ffffff' : '#111111');
        root.style.setProperty('--sys-text-color', isDark ? '#000000' : '#ffffff');
        document.getElementById('btn-dark').classList.toggle('active', isDark);
        document.getElementById('btn-light').classList.toggle('active', !isDark);
    }

    function syncColor(val) {
        canvasEl.style.setProperty('--accent-color', val);
        document.getElementById('color-hex').value = val;
    }
    function syncColorFromHex(val) {
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
            canvasEl.style.setProperty('--accent-color', val);
            document.getElementById('color-picker').value = val;
        }
    }

    function updateFooter(text) {
        const displayPath = text.trim() === "" ? defaultFooter : text;
        document.getElementById('dynamic-footer').innerText = `✦ ${displayPath}`;
    }

    function addPcField() {
        const container = document.getElementById('pc-fields');
        const row = document.createElement('div');
        row.className = 'dynamic-input-row';
        row.innerHTML = `<input type="text" class="in-pc-label" placeholder="PC"><input type="text" class="in-pc-name" placeholder="PC名"><button class="btn-mini" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(row);
    }

    function addPlField() {
        const container = document.getElementById('pl-fields');
        const row = document.createElement('div');
        row.className = 'dynamic-input-row';
        row.innerHTML = `<input type="text" class="in-pl" placeholder="PL名"><button class="btn-mini" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(row);
    }

    function addItem() {
        const dateInput = document.getElementById('in-date').value;
        const systemInput = document.getElementById('in-system').value;
        const title = document.getElementById('in-title').value;
        const kp = document.getElementById('in-kp').value;
        const memo = document.getElementById('in-memo').value;
        const author = document.getElementById('in-author').value;
        
        const pcLabels = Array.from(document.querySelectorAll('.in-pc-label'));
        const pcNames = Array.from(document.querySelectorAll('.in-pc-name'));
        const pcData = pcLabels.map((l, i) => ({ label: l.value || 'PC', name: pcNames[i].value })).filter(d => d.name);

        const pls = Array.from(document.querySelectorAll('.in-pl')).map(i => i.value).filter(v => v);

        if(!title) return alert("シナリオタイトルを入力してください");

        const container = document.getElementById('list-container');
        if (document.getElementById('placeholder-msg')) document.getElementById('placeholder-msg').remove();

        const pcTags = pcData.map(d => `<span class="pc-tag">${d.label}: ${d.name}</span>`).join('');
        
        let memberInfo = "";
        if (kp || pls.length > 0) {
            let parts = [];
            if (kp) parts.push(`KP: ${kp}`);
            if (pls.length > 0) parts.push(`PL: ${pls.join(', ')}`);
            memberInfo = `<div class="item-members">${parts.join(' / ')}</div>`;
        }

        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
            <div class="item-top">
                <div class="item-title-wrap">
                    <div class="item-title">
                        ${systemInput ? `<span class="item-system">${systemInput}</span>` : ''}
                        ${title}
                    </div>
                    ${author ? `<div class="item-scenario-author">${author}</div>` : ''}
                </div>
                <div class="item-date">${dateInput}</div>
            </div>
            <div class="pc-list">${pcTags}</div>
            ${memberInfo}
            <div class="item-memo">${memo}</div>
        `;
        container.appendChild(item);
        
        if (window.innerWidth <= 1024 && sidebar.classList.contains('active')) toggleMenu();
    }

    function saveImage() {
        const canvas = document.getElementById('capture-canvas');
        // 背景色をCSSから取得して明示的に渡す（null だと環境によって失敗する）
        const bgColor = getComputedStyle(canvas).backgroundColor || '#050505';
        html2canvas(canvas, {
            backgroundColor: bgColor,
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false
        }).then(c => {
            const dataUrl = c.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'scenario_list.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }).catch(err => {
            console.error('画像生成エラー:', err);
            alert('画像の保存に失敗しました。');
        });
    }
</script>
</body>
</html>
