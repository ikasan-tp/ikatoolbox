<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKATOOLBOX | LogTool</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:80px;%22>🦑</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@700;900&display=block" rel="stylesheet">

<style>
  :root {
    --bg-dark: #1a1a1a;
    --card-bg: #222222;
    --ui-input: #111111;
    --ui-border: #444444;
    --accent: #C5373C;
    --text-main: #dbdee1;
    --text-sub: #b5bac1;
    --hp-red: #ff5252;
    --san-blue: #00a0e9;
    --crit-color: #00e676;
  }

  .material-symbols-outlined {
    display: inline-block; width: 1em; height: 1em;
    overflow: hidden; white-space: nowrap; direction: ltr; vertical-align: middle;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif; line-height: 1.6;
    max-width: 1200px; margin: 0 auto; padding: 80px 15px 60px;
    background-color: var(--bg-dark); color: var(--text-main);
    position: relative; min-height: 100vh; box-sizing: border-box;
  }

  /* 戻るリンク（growth準拠） */
  .back-link {
    position: absolute; top: 30px; left: 20px;
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text-sub);
    font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.1em; transition: 0.3s; z-index: 1000;
  }
  .back-link:hover { color: var(--accent); transform: translateX(-5px); }

  /* メインカード（growth準拠） */
  .card {
    background: var(--card-bg); padding: 24px 28px;
    border-radius: 12px; border: 1px solid var(--ui-border); margin-bottom: 12px;
  }

  /* ヘッダー（growth準拠） */
  .ui-header { margin-bottom: 16px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; }
  .ui-brand { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 900; color: var(--accent); letter-spacing: 0.4em; display: block; margin-bottom: 2px; }
  .ui-title { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 1.3rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .ui-title-sub { color: var(--text-sub); font-size: 0.8rem; font-weight: 400; letter-spacing: 0.1em; }

  .privacy-note { font-size: 0.75em; color: var(--text-sub); margin-bottom: 16px; }

  /* ガイド（growth準拠） */
  .guide-container { background: #2a2a2a; border-radius: 8px; margin-bottom: 16px; overflow: hidden; border: 1px solid #333; }
  .guide-header { padding: 10px 16px; background: #2e2e2e; cursor: pointer; font-size: 0.85em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background 0.15s; }
  .guide-header:hover { background: #333; }
  .guide-content { padding: 14px 20px; font-size: 0.82em; display: none; }
  .guide-content li { line-height: 2.1; }

  /* ファイル入力（growth準拠） */
  .file-input-area {
    border: 2px dashed #4f545c; padding: 24px 20px;
    border-radius: 8px; background: #2a2a2a;
    cursor: pointer; margin-bottom: 12px; text-align: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .file-input-area:hover, .file-input-area.dragover { border-color: var(--accent); background: #2e2020; }
  input[type="file"] { display: none; }
  .file-label { color: var(--accent); text-decoration: underline; font-weight: bold; }
  .file-info-box {
    font-size: 0.85em; color: var(--accent); margin: 12px auto 0;
    background: rgba(197,55,60,0.1); padding: 10px 12px;
    border-radius: 6px; border-left: 3px solid var(--accent);
    text-align: left; display: none;
  }

  /* ボタン群 */
  .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

  /* 主アクション（解析） */
  .btn-primary {
    display: none; padding: 10px 28px; font-size: 14px; cursor: pointer;
    background-color: var(--accent); color: white; border: none; border-radius: 25px;
    font-weight: bold; transition: 0.2s; font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em;
  }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* 副アクション（ダウンロード系） */
  .btn-ghost {
    display: none; padding: 9px 20px; font-size: 13px; cursor: pointer;
    background: transparent; color: var(--text-sub); border: 1px solid var(--ui-border);
    border-radius: 25px; font-weight: bold; transition: 0.2s; font-family: 'Montserrat', sans-serif;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ステータス */
  #status { margin-top: 12px; font-size: 0.85em; color: var(--text-sub); text-align: center; min-height: 1.4em; }

  /* キャラクター選択（growth準拠のsettings-box風） */
  #excludeSection {
    background: #181818; padding: 16px 18px; border-radius: 8px;
    margin-top: 16px; display: none;
  }
  .exclude-title {
    font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 900;
    color: var(--accent); letter-spacing: 0.3em; margin-bottom: 10px;
  }
  .exclude-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .exclude-item {
    background: #252525; padding: 5px 12px; border-radius: 20px;
    font-size: 0.78em; cursor: pointer; transition: 0.15s;
    color: var(--text-sub); border: 1px solid transparent; user-select: none;
  }
  .exclude-item:hover { background: #2e2e2e; }
  .exclude-item.is-active { color: #fff; border-color: #6e7278; background: #383a40; }
  .exclude-item input { display: none; }

  /* 統計エリア */
  #statsArea { display: none; flex-direction: column; gap: 12px; margin-top: 0; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
  .stats-card {
    background: var(--card-bg); padding: 20px 24px;
    border-radius: 12px; border: 1px solid var(--ui-border); overflow-x: auto;
  }

  /* stats-card見出し（growth準拠のsection-label風） */
  .stats-card h3 {
    font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 900;
    color: var(--accent); letter-spacing: 0.3em; margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1px solid var(--ui-border);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.88em; min-width: 380px; }
  th { padding: 8px 10px; text-align: left; color: var(--text-sub); font-size: 0.78em; border-bottom: 1px solid rgba(255,255,255,0.08); font-family: 'Montserrat', sans-serif; letter-spacing: 0.04em; }
  td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .bar-container { background: #1a1a1a; height: 4px; border-radius: 2px; margin-top: 6px; overflow: hidden; width: 100%; }
  .bar-fill { height: 100%; transition: width 0.5s ease-out; border-radius: 2px; }

  .c-text { color: var(--crit-color); font-weight: bold; }
  .f-text { color: var(--hp-red); font-weight: bold; }
  .rank-name { font-weight: 500; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
  .skill-tag { background: #2e2e2e; color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: bold; border: 1px solid #444; font-size: 0.85em; }

  @media screen and (max-width: 600px) {
    body { padding: 60px 12px 60px; }
    .card { padding: 18px 14px; }
    .stats-card { padding: 14px; }
    table { font-size: 0.82em; min-width: 280px; }
    td, th { padding: 8px 5px; }
    .back-link { top: 10px; left: 10px; }
  }
</style>
</head>
<body>

  <a href="index.html" class="back-link">
    <span class="material-symbols-outlined" style="font-size: 1.2rem;">arrow_back_ios</span>
    BACK TO TOOLBOX
  </a>

  <div class="card">
    <div class="ui-header">
      <span class="ui-brand">IKATOOLBOX</span>
      <div class="ui-title">LOG TOOL <span class="ui-title-sub">for CCFOLIA</span></div>
    </div>

    <p class="privacy-note">※ログはサーバーに送信されず、ブラウザ内でのみ処理されます。</p>
    
    <div class="guide-container">
      <div class="guide-header" onclick="toggleGuide()"><span>✦ つかいかた</span><span id="guideArrow">▼</span></div>
      <div class="guide-content" id="guideContent">
        <ul style="margin:0; padding-left:20px; font-size:0.85em;">
          <li><b>解析して統計を表示</b>：ダイス統計、HP/SAN増減、チャット数、技能ランキングを表示します。</li>
          <li><b>掃除済みログを保存</b>：「削除済」と空白発言を消去したログを保存します。</li>
          <li><b>会話ログを保存</b>：systemメッセージ、削除済、空白発言を消して保存します。</li>
        </ul>
      </div>
    </div>
    
    <div class="file-input-area" id="dropZone">
      <label for="logFile" style="cursor:pointer; display:block;">
        <p id="dropText">ログファイルをドロップするか<br><span class="file-label">ファイルを選択</span></p>
        <input type="file" id="logFile" accept=".html,.txt">
        <div id="fileInfoBox" class="file-info-box"></div>
      </label>
    </div>

    <div class="btn-group">
      <button id="processBtn" class="btn-primary">解析して統計を表示</button>
      <button id="downloadBtn" class="btn-ghost">掃除済みログを保存</button>
      <button id="saveRpHtmlBtn" class="btn-ghost">会話ログを保存</button>
    </div>

    <div id="excludeSection">
      <div class="exclude-title">表示キャラクター</div>
      <div id="excludeList" class="exclude-list"></div>
    </div>
    <div id="status"></div>
  </div>

  <div id="statsArea"></div>

  <script>
    function toggleGuide() {
      const content = document.getElementById('guideContent');
      content.style.display = (content.style.display === 'block') ? 'none' : 'block';
      document.getElementById('guideArrow').innerText = (content.style.display === 'block') ? '▲' : '▼';
    }

    let originalHtml = "", diceUsers = new Set(), currentFileName = "";
    const tabExcludeRegex = /\[info\]|\[other\]/i;
    const diceStrictRegex = /(\bCC\b|\bCCB\b|\d+d\d+).*＞/i;
    const autoExcludeRegex = /KP|GM|キーパー|▽|🦑|🍜/i;

    function isPracticallyEmpty(element) {
      if (!element) return true;
      const text = element.textContent || element.innerText || "";
      return text.replace(/[\s\u3000\u00a0\n\r]/g, '').length === 0;
    }

    function resetAll() {
      originalHtml = "";
      diceUsers.clear();
      document.getElementById('statsArea').innerHTML = '';
      document.getElementById('statsArea').style.display = 'none';
      document.getElementById('excludeSection').style.display = 'none';
      document.getElementById('excludeList').innerHTML = '';
      document.getElementById('status').innerText = '';
      document.getElementById('processBtn').style.display = 'none';
      document.getElementById('downloadBtn').style.display = 'none';
      document.getElementById('saveRpHtmlBtn').style.display = 'none';
    }

    function handleFile(file) {
      if (!file) return;
      resetAll();
      currentFileName = file.name;
      const infoBox = document.getElementById('fileInfoBox');
      infoBox.innerHTML = `<span class="file-name" style="font-weight:bold;">選択中: ${file.name}</span><span class="next-guide" style="display:block; font-size:0.85em; color:var(--text-sub); margin-top:4px;">別のファイルをドロップして入れ替えられます</span>`;
      infoBox.style.display = 'block';
      document.getElementById('dropText').style.display = 'none';
      document.getElementById('processBtn').style.display = 'inline-block';
      const reader = new FileReader();
      reader.onload = (ev) => { originalHtml = ev.target.result; };
      reader.readAsText(file, 'UTF-8');
    }

    document.getElementById('logFile').addEventListener('change', (e) => handleFile(e.target.files[0]));
    document.getElementById('dropZone').addEventListener('dragover', (e) => { e.preventDefault(); });
    document.getElementById('dropZone').addEventListener('dragenter', () => document.getElementById('dropZone').classList.add('dragover'));
    document.getElementById('dropZone').addEventListener('dragleave', () => document.getElementById('dropZone').classList.remove('dragover'));
    document.getElementById('dropZone').addEventListener('drop', (e) => { e.preventDefault(); document.getElementById('dropZone').classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

    function extractDiceUsers(html) {
      diceUsers.clear();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('p').forEach(p => {
        const spans = p.querySelectorAll('span');
        if (spans.length < 2 || tabExcludeRegex.test(spans[0].textContent)) return;
        const text = p.textContent.trim();
        const dM = text.match(/\[.*?\]\s*(.*?)\s*:\s*(.*)/i);
        if (dM && dM[1]) {
          const name = dM[1].trim();
          const msg = dM[2].trim();
          if (!autoExcludeRegex.test(name) && diceStrictRegex.test(msg)) { diceUsers.add(name); }
        }
      });
    }

    function renderExcludeToggles() {
      const list = document.getElementById('excludeList');
      list.innerHTML = '';
      [...diceUsers].sort().forEach(name => {
        const label = document.createElement('label');
        label.className = 'exclude-item is-active';
        label.innerHTML = `<input type="checkbox" value="${name}" checked> ${name}`;
        label.querySelector('input').addEventListener('change', (e) => {
          label.classList.toggle('is-active', e.target.checked);
          updateStats();
        });
        list.appendChild(label);
      });
    }

    function updateStats() {
      const checkedUsers = Array.from(document.querySelectorAll('#excludeList input:checked')).map(i => i.value);
      const dice = {}, damage = {}, chats = {}, skills = {};
      const doc = new DOMParser().parseFromString(originalHtml, 'text/html');
      doc.querySelectorAll('p').forEach(p => {
        const spans = p.querySelectorAll('span');
        if (spans.length < 2 || tabExcludeRegex.test(spans[0].textContent)) return;
        const lastSpan = spans[spans.length - 1];
        const rawText = p.textContent.replace(/\s+/g, ' ');
        const cM = rawText.match(/\[.*?\]\s*(.*?)\s*:\s*(.*)/);
        if (cM && !rawText.trimStart().startsWith('system :')) {
          const name = cM[1].trim(), msg = cM[2].trim();
          if (msg.includes('削除済') || isPracticallyEmpty(lastSpan)) return;
          if (checkedUsers.includes(name)) {
            chats[name] = (chats[name] || 0) + 1;
            const sNames = msg.match(/【(.*?)】/g);
            if (sNames) sNames.forEach(s => {
              const sn = s.replace(/[【】]/g, '').trim();
              if (sn && !sn.match(/ボーナス|ペナルティ/)) {
                if (!skills[sn]) skills[sn] = { total: 0, users: {} };
                skills[sn].total++; skills[sn].users[name] = (skills[sn].users[name] || 0) + 1;
              }
            });
            const dR = msg.match(/(?:\b(CC|CCB)\b.*)?＞\s*(\d+)/i);
            if (dR) {
              if (!dice[name]) dice[name] = { name, total: 0, crit: 0, fum: 0, suc: 0, sumValues: 0 };
              dice[name].total++; dice[name].sumValues += parseInt(dR[2]);
              if (msg.match(/クリティカル|決定的成功/)) { dice[name].crit++; dice[name].suc++; }
              else if (msg.match(/ファンブル|致命的失敗/)) { dice[name].fum++; }
              else if (msg.match(/成功|スペシャル|イクストリーム|ハード|レギュラー/)) { dice[name].suc++; }
            }
          }
        }
        const sM = rawText.match(/system\s*:\s*\[\s*(.*?)\s*\]\s*(.*?)\s*:\s*(\d+)\s*→\s*(\d+)/i);
        if (sM && checkedUsers.includes(sM[1].trim()) && parseInt(sM[4]) < parseInt(sM[3])) {
          const char = sM[1].trim(), attr = sM[2].trim(), diff = parseInt(sM[3]) - parseInt(sM[4]);
          if (!damage[char]) damage[char] = { name: char, hp: 0, san: 0 };
          if (attr.match(/HP|耐久/i)) damage[char].hp += diff;
          if (attr.match(/SAN|正気/i)) damage[char].san += diff;
        }
      });
      renderTables(Object.values(dice), Object.values(damage), chats, skills);
    }

    function renderTables(diceList, damageList, chats, skills) {
      const statsArea = document.getElementById('statsArea');
      statsArea.innerHTML = `
        <div class="stats-row"><div class="stats-card"><h3>✦ ダイス統計</h3><div id="diceTableWrapper"></div></div></div>
        <div class="stats-row">
          <div class="stats-card"><h3>✦ HP減少</h3><div id="hpTableWrapper"></div></div>
          <div class="stats-card"><h3>✦ SAN減少</h3><div id="sanTableWrapper"></div></div>
        </div>
        <div class="stats-row">
          <div class="stats-card"><h3>✦ チャット回数</h3><div id="chatTableWrapper"></div></div>
          <div class="stats-card"><h3>✦ 技能ランキング</h3><div id="skillTableWrapper"></div></div>
        </div>`;
      diceList.sort((a, b) => b.total - a.total);
      let dH = '<table><thead><tr><th>名前</th><th style="text-align:right;">回数</th><th style="text-align:right;">成功率</th><th style="text-align:right;">C / F</th></tr></thead><tbody>';
      diceList.forEach(s => {
        dH += `<tr><td><span class="rank-name">${s.name}</span></td><td style="text-align:right; font-weight:700;">${s.total}</td><td style="text-align:right;">${((s.suc/s.total)*100).toFixed(0)}%</td><td style="text-align:right;"><span class="c-text">${s.crit}</span> / <span class="f-text">${s.fum}</span></td></tr>`;
      });
      document.getElementById('diceTableWrapper').innerHTML = diceList.length ? dH + '</tbody></table>' : '<p>なし</p>';
      ['hp', 'san'].forEach(type => {
        const filtered = damageList.filter(d => d[type] > 0).sort((a, b) => b[type] - a[type]);
        const wrap = document.getElementById(type + 'TableWrapper');
        if (!filtered.length) { wrap.innerHTML = '<p>なし</p>'; return; }
        const max = filtered[0][type], color = type === 'hp' ? 'var(--hp-red)' : 'var(--san-blue)';
        let h = '<table><thead><tr><th>名前</th><th style="text-align:right; width:60px;">減少</th></tr></thead><tbody>';
        filtered.forEach(d => h += `<tr><td><span class="rank-name">${d.name}</span><div class="bar-container"><div class="bar-fill" style="width:${(d[type]/max*100)}%; background:${color}"></div></div></td><td style="text-align:right; vertical-align:top;"><span style="color:${color}; font-weight:800;">-${d[type]}</span></td></tr>`);
        wrap.innerHTML = h + '</tbody></table>';
      });
      const cL = Object.entries(chats).sort((a, b) => b[1] - a[1]);
      const maxC = cL.length > 0 ? cL[0][1] : 1;
      let cH = '<table><thead><tr><th>名前</th><th style="text-align:right; width:60px;">回数</th></tr></thead><tbody>';
      cL.forEach(([n, c]) => cH += `<tr><td><span class="rank-name">${n}</span><div class="bar-container"><div class="bar-fill" style="width:${(c/maxC*100)}%; background:var(--text-sub)"></div></div></td><td style="text-align:right; vertical-align:top;"><span style="font-weight:800;">${c}</span></td></tr>`);
      document.getElementById('chatTableWrapper').innerHTML = cL.length ? cH + '</tbody></table>' : '<p>なし</p>';
      const sL = Object.entries(skills).sort((a, b) => b[1].total - a[1].total).slice(0, 15);
      let sH = '<table><thead><tr><th>技能</th><th>最多使用者</th><th style="text-align:right;">回数</th></tr></thead><tbody>';
      sL.forEach(([n, data]) => {
        const userEntries = Object.entries(data.users).sort((a, b) => b[1] - a[1]);
        const topUser = userEntries.length > 0 ? userEntries[0][0] : "不明";
        sH += `<tr><td><span class="skill-tag">${n}</span></td><td style="color:var(--text-sub); font-size:0.9em;">${topUser}</td><td style="text-align:right; font-weight:700;">${data.total}</td></tr>`;
      });
      document.getElementById('skillTableWrapper').innerHTML = sL.length ? sH + '</tbody></table>' : '<p>なし</p>';
    }

    document.getElementById('processBtn').addEventListener('click', function() {
      if (!originalHtml) return;
      extractDiceUsers(originalHtml);
      renderExcludeToggles();
      updateStats();
      document.getElementById('excludeSection').style.display = 'block';
      document.getElementById('statsArea').style.display = 'flex';
      document.getElementById('downloadBtn').style.display = 'inline-block';
      document.getElementById('saveRpHtmlBtn').style.display = 'inline-block';
      this.style.display = 'none';
      document.getElementById('status').innerText = '解析完了 🦑';
    });

    document.getElementById('saveRpHtmlBtn').addEventListener('click', () => {
      const doc = new DOMParser().parseFromString(originalHtml, 'text/html');
      doc.querySelectorAll('p').forEach(p => {
        const spans = p.querySelectorAll('span');
        if (spans.length > 0 && tabExcludeRegex.test(spans[0].textContent)) { p.remove(); return; }
        if (p.textContent.trim().startsWith('system :') || p.textContent.includes('削除済') || (spans.length > 0 && isPracticallyEmpty(spans[spans.length-1]))) p.remove();
      });
      const b = new Blob([doc.documentElement.outerHTML], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = currentFileName.replace(/\.[^/.]+$/, "") + "_Conversation.html"; a.click();
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const doc = new DOMParser().parseFromString(originalHtml, 'text/html');
      doc.querySelectorAll('p').forEach(p => {
        const spans = p.querySelectorAll('span');
        if (p.textContent.includes('削除済') || (spans.length > 0 && isPracticallyEmpty(spans[spans.length-1]))) p.remove();
      });
      const b = new Blob([doc.documentElement.outerHTML], { type: 'text/html' });
